name: Validate Privacy Notices

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-privacy-notices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📦 Setup Node + Bun + install deps
        uses: ./.github/actions/setup-node-bun-install
      - name: Run privacy notices validation
        env:
          RUN_PUBLIC_ENDPOINT_PROBES: 'true'
        run: bun run validate:privacy-notices
