name: Validate Privacy Notices

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-privacy-notices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run privacy notices validation
        run: bun run validate:privacy-notices
