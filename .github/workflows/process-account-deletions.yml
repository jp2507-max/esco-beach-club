name: Process Account Deletions

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  finalize-expired-account-deletions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📦 Setup Node + Bun + install deps
        uses: ./.github/actions/setup-node-bun-install

      - name: Process expired deletion requests
        env:
          EXPO_PUBLIC_INSTANT_APP_ID: ${{ secrets.EXPO_PUBLIC_INSTANT_APP_ID }}
          INSTANT_APP_ADMIN_TOKEN: ${{ secrets.INSTANT_APP_ADMIN_TOKEN }}
        run: bun run account-deletion:process-expired
